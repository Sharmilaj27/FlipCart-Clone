<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Product Details</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <header class="navbar">

        <div class="logo">
            <h2>Flip<span>kart</span></h2>
        </div>

        <div class="nav-links">

            <a href="index.html">Home</a>

            <a href="products.html">Products</a>

            <a href="cart.html">
                Cart
            </a>

        </div>

    </header>

    <!-- Product Details -->

    <div class="product-details-container">

        <div class="product-image">

            <img
            src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=800"
            alt="Product">

        </div>

        <div class="product-info">

            <h1>iPhone 15 Pro</h1>

            <div class="rating-box">
                4.8 ★
            </div>

            <h2 class="detail-price">
                ₹79,999
            </h2>

            <p class="detail-description">

                Apple iPhone 15 Pro with powerful
                performance, excellent camera,
                premium design and long battery life.

            </p>

            <ul class="feature-list">

                <li>✔ 128 GB Storage</li>

                <li>✔ A17 Pro Chip</li>

                <li>✔ 48MP Camera</li>

                <li>✔ Titanium Design</li>

            </ul>

            <button class="add-cart">

                Add To Cart

            </button>

            <button class="buy-now">

                Buy Now

            </button>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <div class="footer-content">

            <h3>Flipkart Clone</h3>

            <p>
                Best Online Shopping Experience
            </p>

        </div>

    </footer>

</body>

</html>
